<!DOCTYPE html>
<!-- This example demonstrates how to load and display vector tiles in Leaflet using the Leaflet.VectorGrid plugin. -->
<html lang="en">

<head>
    <meta charset="utf-8">
    <title>Simple Vector Tiles with L.CRS.Simple</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.7.1/dist/leaflet.css">
    <style>
        #map {
            height: 100vh;
            width: 100vw;
        }
    </style>
</head>

<body>
    <div id="map"></div>
    <script src="https://unpkg.com/leaflet@1.7.1/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet.vectorgrid/dist/Leaflet.VectorGrid.js"></script>
    <script>
        // Define custom CRS
        var customCRS = L.extend({}, L.CRS.Simple, {
            transformation: new L.Transformation(1, 0, 1, 0),
            scale: function (zoom) {
                return Math.pow(2, zoom);
            },
            zoom: function (scale) {
                return Math.log(scale) / Math.LN2;
            }
        });

        // Create map with custom CRS
        var map = L.map('map', {
            crs: customCRS,
            minZoom: 0,
            maxZoom: 8,
            center: [50, 50], // Center the map to match the coordinate system
            zoom: 2,
            zoomSnap: 1,
            zoomDelta: 1,
            maxBounds: [[0, 0], [200, 200]],  // Set the bounds to fit the coordinate system
            noWrap: true
        });

        map.createPane('backgroundPane');
        map.createPane('vectorPane');

        map.getPane('backgroundPane').style.zIndex = 200;
        map.getPane('vectorPane').style.zIndex = 400;

        // Add background image overlay with adjustable offsets
        // Replace 'https://example.com/background-image.jpg' with the URL of your actual background image
        var imageUrl = 'http://localhost:8080/data/hackathon/intensity/stitched_1.ome.png';
        
        // Offset variables to adjust the positioning of the background image
        // Adjust these values to fix alignment issues between the background image and vector tiles
        var xOffset = 0; // Positive moves right, negative moves left
        var yOffset = 0;  // Positive moves down, negative moves up
        var size = 256;   // Size of the image in pixels
        // Apply offsets to image bounds
        var imageBounds = [
            [0 + yOffset, 0 + xOffset],             // Top-left corner with offset
            [size + yOffset, size + xOffset]          // Bottom-right corner with offset
        ];
        
        L.imageOverlay(imageUrl, imageBounds, {
            opacity: 1.0,
            pane: 'backgroundPane'  // Background image assigned to backgroundPane
        }).addTo(map);

        // Define a collection of 16 distinct colors for the labels
        var colorPalette = [
            '#e6194B', // Red
            '#3cb44b', // Green
            '#ffe119', // Yellow
            '#4363d8', // Blue
            '#f58231', // Orange
            '#911eb4', // Purple
            '#42d4f4', // Cyan
            '#f032e6', // Magenta
            '#bfef45', // Lime
            '#fabed4', // Pink
            '#469990', // Teal
            '#dcbeff', // Lavender
            '#9A6324', // Brown
            '#fffac8', // Beige
            '#800000', // Maroon
            '#aaffc3'  // Mint
        ];

        // Object to store the mapping between label values and colors
        var labelColorMap = {};
        var nextColorIndex = 0;

        // Function to get color for a specific label value
        function getColorForLabel(properties) {
            // Create a consistent identifier string based on the most relevant property
            // Try common properties that might exist in your data
            var identifier;
            
            if (properties.class_label !== undefined) {
                identifier = "class_" + properties.class_label;
            } else if (properties.label !== undefined) {
                identifier = "label_" + properties.label;
            } else if (properties.id !== undefined) {
                identifier = "id_" + properties.id;
            } else if (properties.cell_id !== undefined) {
                identifier = "cell_" + properties.cell_id;
            } else if (properties.cluster !== undefined) {
                identifier = "cluster_" + properties.cluster;
            } else {
                // As a last resort, use the string representation of the entire properties object
                identifier = JSON.stringify(properties);
            }
            
            // If this identifier already has an assigned color, return it
            if (labelColorMap.hasOwnProperty(identifier)) {
                return labelColorMap[identifier];
            }
            
            // Otherwise, assign a new color to this identifier
            var color = colorPalette[nextColorIndex % colorPalette.length];
            labelColorMap[identifier] = color;
            nextColorIndex++;
            console.log("Assigned color", color, "to", identifier);
            return color;
        }

        // Define vector tile options with a styling function
        var vectorTileOptions = {
            rendererFactory: L.svg.tile, // Use SVG renderer for better transparency support
            vectorTileLayerStyles: {
                geojsonLayer: function(properties, zoom) {
                    // Pass the entire properties object to get a color
                    var fillColor = getColorForLabel(properties);
                    
                    return {
                        fillColor: fillColor,
                        fillOpacity: 0.5, // Ensure fill transparency
                        weight: 1,
                        opacity: 0.5, // Ensure stroke transparency
                        color: '#000000',
                        fill: true
                    };
                }
            },
            interactive: true,
            noWrap: true,
            pane: 'vectorPane'  // Use our custom pane
        };

        // Add vector tile layer
        var vectorGrid = L.vectorGrid.protobuf('http://localhost:8080/data/hackathon/vectortiles/stitched_1/{z}/{x}/{y}.pbf', vectorTileOptions).addTo(map);

        // Variable to track the currently active tooltip
        let activeTooltip = null;

        // Function to handle mouseover event
        function onFeatureMouseOver(e) {
        const properties = e.layer.properties;
        const latlng = e.latlng;

        // If there's already an active tooltip, remove it
        if (activeTooltip) {
            map.removeLayer(activeTooltip);
        }

        // Create a new tooltip
        const tooltipContent = Object.entries(properties)
            .map(([key, value]) => `<strong>${key}:</strong> ${value}`)
            .join('<br>');

        activeTooltip = L.tooltip({
            permanent: false,
            direction: 'auto',
            className: 'feature-tooltip',
        })
            .setContent(tooltipContent)
            .setLatLng(latlng)
            .addTo(map);
        }

        // Function to handle mousemove event
        function onFeatureMouseMove(e) {
        const latlng = e.latlng;

        if (activeTooltip) {
            activeTooltip.setLatLng(latlng); // Update the tooltip position
        }
        }

        // Function to handle mouseout event
        function onFeatureMouseOut(e) {
        if (activeTooltip) {
            map.removeLayer(activeTooltip); // Remove the tooltip
            activeTooltip = null; // Reset the active tooltip
        }
        }

        // Attach event handlers to the vector grid
        vectorGrid.on('mouseover', onFeatureMouseOver);
        vectorGrid.on('mousemove', onFeatureMouseMove);
        vectorGrid.on('mouseout', onFeatureMouseOut);

        // Optional: Handle click events
        vectorGrid.on('click', function (e) {
            console.log('Clicked feature properties:', e.layer.properties);
            console.log('Property keys:', Object.keys(e.layer.properties));
            console.log('Property values:', Object.values(e.layer.properties));
            alert('Check browser console for feature properties');
        });

        // Error handling for tile loading
        vectorGrid.on('tileerror', function (error) {
            console.error('Tile loading error:', error);
        });
    </script>
</body>

</html>
